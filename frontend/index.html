<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Todo List</title>
</head>

<body>

<main class="container">

    <!-- ===============================
         HEADER (PRONTO)
    =============================== -->
    <header class="header">
        <h1>Todo List</h1>
        <p>Organize suas tarefas</p>
    </header>


    <!-- ===============================
         DESAFIO 1 (HTML)
         Aluno: deve montar os cards
    =============================== -->
    <section class="stats">

        <!-- TODO: criar 3 cards -->
        <!-- Dica: Total | Ativas | Completas -->
        <div class="cards">
            <span class="number">3</span>
            <span class="number">2</span>
            <span class="number">1</span>
        </div>
        <input name=" " form="text" type="text">
        <button onclick="" id>+ Adicionar</button>
    </section>


    <!-- ===============================
         ADD TASK (PRONTO)
    =============================== -->
    <section class="add-task">
        <input type="text" placeholder="Nova tarefa...">
        <button class="btn-add">Adicionar</button>
    </section>


    <!-- ===============================
         FILTROS (PARCIAL)
         Aluno: pode estilizar e melhorar
    =============================== -->
   <section class="filters">
    <button class="filter active" data-filter="all">Todas</button>
    <button class="filter" data-filter="active">Ativas</button>
    <button class="filter" data-filter="completed">Completas</button>
</section>


    <!-- ===============================
        LISTA (PRONTA E VAZIA)
    =============================== -->
    <section class="tasks">
    
        <!-- JS vai renderizar aqui -->
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
