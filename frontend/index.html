<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Todo List</title>
</head>

<body>

<main class="container">

    <!-- ===============================
         HEADER (PRONTO)
    =============================== -->
    <header class="header">
        <h1>Todo List</h1>
        <p>Organize suas tarefas</p>
    </header>


    <!-- ===============================
         DESAFIO 1 (HTML)
         Aluno: deve montar os cards
    =============================== -->
    <section class="stats">

        <div class="card">
            <h3>Total</h3>
            <span id="total">0</span>
        </div>
    
        <div class="card">
            <h3>Ativas</h3>
            <span id="ativas">0</span>
        </div>
    
        <div class="card">
            <h3>Completas</h3>
            <span id="completas">0</span>
        </div>
    
    </section>


    <!-- ===============================
         ADD TASK (PRONTO)
    =============================== -->
    <section class="add-task">
        <input type="text" placeholder="Nova tarefa...">
        <button class="btn-add">Adicionar</button>
    </section>


    <!-- ===============================
         FILTROS (PARCIAL)
         Aluno: pode estilizar e melhorar
    =============================== -->
    <section class="filters">
        <button class="filter active">Todas</button>
        <button class="filter">Ativas</button>
        <button class="filter">Completas</button>
    </section>


    <!-- ===============================
        LISTA (PRONTA E VAZIA)
    =============================== -->
    <section class="tasks">
        <!-- JS vai renderizar aqui -->
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
